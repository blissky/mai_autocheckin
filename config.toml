# 自动签到插件配置
# 修改后保存即可，插件会自动重载生效（重启 WebUI 与定时任务）。

[plugin]
# 是否启用插件功能（WebUI 与定时签到）
enabled = true
# 配置版本（勿手动修改）
config_version = "1.0.0"

[webui]
# WebUI 控制面板端口
port = 9010
# WebUI 监听地址，127.0.0.1 仅限本机访问，0.0.0.0 允许外部访问
host = "127.0.0.1"
# WebUI 登录密钥，请务必修改默认值
token = "sk-change-me"
# WebUI 登录空闲超时（分钟）
session_timeout = 30
# 是否信任 X-Forwarded-For 请求头（仅在经反向代理访问 WebUI 时开启）
trust_proxy = false
# WebUI 画面刷新间隔（毫秒）
screenshot_interval = 500

[schedule]
# 定时签到计划，每行一条 5 字段 Cron 表达式（分 时 日 月 周），# 开头为注释
# 示例：
#   30 8 * * *      每天 08:30
#   0 20 * * 1-5    工作日 20:00
cron_rules = "30 8 * * *"
# 定时签到使用的时区
timezone = "Asia/Shanghai"

[browser]
# 无头模式运行浏览器（服务器环境请保持 true）
headless = true
# 站点页面加载超时（秒）
page_load_timeout = 30
# 回放操作之间的最小间隔（毫秒）
action_delay = 1000
# 站点导航完成后、识图预检与动作回放前的等待（秒）
checkin_wait = 5
# 浏览器空闲自动关闭时间（分钟），0 表示禁用
idle_timeout = 10

[vision]
# 启用多模态大模型识图验证签到结果（需在 WebUI 中为站点配置识图选区与关键词）
use_vision_check = false
# 识图使用的模型名称，留空使用宿主默认模型（需支持图像输入）
vision_model = ""
