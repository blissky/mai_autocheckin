# 自动签到插件配置
# 修改后保存即可，插件会自动重载生效（重启 WebUI 与定时任务）。
# 识图验证无需配置：宿主 MaiBot 配置了 vlm（视觉）任务时自动启用。

[webui]
# 端口：WebUI 控制面板端口
port = 9010
# 监听地址：127.0.0.1 仅限本机访问，0.0.0.0 允许外部访问
host = "127.0.0.1"
# 登录密钥：访问 WebUI 时需要输入，请务必修改默认值
token = "sk-change-me"
# 登录空闲超时（分钟）：超时未操作后需要重新登录 WebUI
session_timeout = 30
# 信任反向代理：信任 X-Forwarded-For 请求头识别客户端 IP，仅在经反向代理访问时开启
trust_proxy = false
# 画面刷新间隔（毫秒）：WebUI 中浏览器画面的截图刷新间隔
screenshot_interval = 500

[schedule]
# 签到计划：每行一条 5 字段 Cron 表达式（分 时 日 月 周），# 开头为注释
# 示例：
#   30 8 * * *      每天 08:30
#   0 20 * * 1-5    工作日 20:00
cron_rules = "30 8 * * *"
# 时区：定时签到使用的时区
timezone = "Asia/Shanghai"

[browser]
# 无头模式：不显示浏览器窗口运行，服务器环境请保持开启
headless = true
# 页面加载超时（秒）：站点页面加载的最长等待时间
page_load_timeout = 30
# 操作间隔（毫秒）：回放录制操作之间的最小间隔
action_delay = 1000
# 签到前等待（秒）：站点导航完成后、识图预检与动作回放前的等待时间
checkin_wait = 5
# 空闲自动关闭（分钟）：浏览器空闲超过该时长后自动关闭，0 表示禁用
idle_timeout = 10

[plugin]
# 配置版本号（宿主要求的字段，勿手动修改）
config_version = "1.0.0"
